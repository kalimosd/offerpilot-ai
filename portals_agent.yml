# 岗位扫描配置（AI Agent 专项）
# 用法: python3 skill-pack/scripts/scan_portals.py --config portals_agent.yml

title_filter:
  positive:
    - "Agent"
    - "agent"
    - "Agentic"
    - "AI应用"
    - "AI工程"
    - "AI平台"
    - "大模型应用"
    - "LLM应用"
    - "Copilot"
    - "AI Native"
    - "Prompt"
    - "RAG"
    - "AI产品"
    - "AI开发"
  negative:
    - "实习"
    - "Intern"
    - "算法研究员"
    - "搜广推"
    - "推荐算法"
    - "搜索算法"
    - "广告算法"
    - "后训练"
    - "预训练"
    - "强化学习"
    - "CV算法"
    - "图像算法"
    - "语音算法"
    - "自动驾驶"
    - "风控算法"
    - "10年以上"
    - "8年以上"
    - "七年"
    - "十年"
    # 排除城市
    - "北京"
    - "Beijing"
    - "西安"
    - "长沙"
    - "武汉"
  seniority_boost:
    - "高级"
    - "资深"
    - "Senior"
    - "Staff"
    - "Lead"

