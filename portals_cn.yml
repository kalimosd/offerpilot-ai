# 岗位扫描配置（中国市场）
# 用法: python3 skill-pack/scripts/scan_portals.py

# 标题过滤规则
title_filter:
  positive:
    # Android / 客户端
    - "Android"
    - "安卓"
    - "Launcher"
    - "Framework"
    - "客户端"
    - "终端开发"
    - "Flutter"
    - "Rust"
    - "跨端"
    - "跨平台"
    - "性能优化"
    - "基础体验"
    - "稳定性"
    # AI
    - "AI"
    - "大模型"
    - "LLM"
    - "Agent"
    - "算法"
    - "机器学习"
    - "深度学习"
    - "NLP"
    - "数据挖掘"
    # AI + 工程结合
    - "AI工程"
    - "AI应用"
    - "AI Native"
    - "端侧"
    - "on-device"
    - "MLOps"
    # 通用开发
    - "软件开发"
    - "后端"
    - "全栈"
  negative:
    - "实习"
    - "Intern"
    - "iOS"
    - "前端"
    - "PHP"
    - "测试"
    - "运维"
    - "硬件"
    - "FPGA"
    - "嵌入式"
    - "10年以上"
    - "8年以上"
    - "七年"
    - "十年"
  seniority_boost:
    - "高级"
    - "资深"
    - "专家"
    - "Senior"
    - "Staff"
    - "Lead"
    - "主管"

# Greenhouse API 公司（外企，结构化数据，最可靠）
greenhouse_companies:
  - name: Anthropic
    slug: anthropic
    enabled: true
  - name: Vercel
    slug: vercel
    enabled: true
  - name: DeepMind
    slug: deepmind
    enabled: true
  - name: Glean
    slug: gleanwork
    enabled: true
  - name: Airtable
    slug: airtable
    enabled: true
  - name: Intercom
    slug: intercom
    enabled: true
  - name: Stability AI
    slug: stabilityai
    enabled: true
  - name: Arize AI
    slug: arizeai
    enabled: true

# 国内大厂 API（直接调内部接口，无需 Playwright）
cn_api_companies:
  - name: 美团
    type: meituan
    api_url: https://zhaopin.meituan.com/api/official/job/getJobList
    keywords: "AI"
    enabled: true
  - name: 快手
    type: kuaishou
    api_url: https://zhaopin.kuaishou.cn/recruit/e/api/v1/open/positions/simple
    keywords: ""
    enabled: true
  - name: 滴滴
    type: didi
    api_url: https://talent.didiglobal.com/recruit-portal-service/api/job/front/list
    keywords: ""
    enabled: true

# Playwright 爬取公司（SPA 页面，API 不可用时的备选）
playwright_companies:
  - name: 字节跳动
    careers_url: https://jobs.bytedance.com/experienced/position
    enabled: false
    notes: "需要登录"
  - name: 腾讯
    careers_url: https://careers.tencent.com/
    enabled: false
    notes: "无公开 API"
  - name: 阿里巴巴
    careers_url: https://talent.alibaba.com/
    enabled: false
    notes: "无公开 API"
  - name: 百度
    careers_url: https://talent.baidu.com/
    enabled: false
    notes: "无公开 API"

# 搜索引擎查询（第三层：广撒网发现岗位）
# 通过 Google/Bing site: 搜索发现各公司招聘页上的岗位
search_queries:
