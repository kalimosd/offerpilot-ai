# 岗位扫描配置（中国市场）
# 用法: python3 skill-pack/scripts/scan_portals.py

# 标题过滤规则
title_filter:
  positive:
    # Android / 客户端（核心方向）
    - "Android"
    - "安卓"
    - "Launcher"
    - "Framework"
    - "客户端"
    - "终端开发"
    - "Flutter"
    - "Rust"
    - "跨端"
    - "跨平台"
    - "性能优化"
    - "基础体验"
    - "稳定性"
    # AI 工程 / 应用（非算法研究）
    - "AI工程"
    - "AI应用"
    - "AI Agent"
    - "AI Native"
    - "AI平台"
    - "端侧AI"
    - "on-device"
    - "MLOps"
    - "大模型应用"
    # 通用开发
    - "软件开发"
    - "后端"
    - "全栈"
    - "数据开发"
  negative:
    - "实习"
    - "Intern"
    - "iOS"
    - "前端"
    - "PHP"
    - "测试"
    - "运维"
    - "硬件"
    - "FPGA"
    - "嵌入式"
    - "10年以上"
    - "8年以上"
    - "七年"
    - "十年"
    # 纯算法研究方向（不匹配工程背景）
    - "算法研究员"
    - "算法专家"
    - "搜广推"
    - "推荐算法"
    - "搜索算法"
    - "广告算法"
    - "后训练"
    - "预训练"
    - "强化学习"
    - "多模态研究"
    - "CV算法"
    - "图像算法"
    - "语音算法"
    - "自动驾驶算法"
    - "风控算法"
    - "产品经理"
    - "产品运营"
    - "运营专家"
    - "产品专家"
  seniority_boost:
    - "高级"
    - "资深"
    - "专家"
    - "Senior"
    - "Staff"
    - "Lead"
    - "主管"

# Greenhouse API 公司（外企，结构化数据，最可靠）
greenhouse_companies:
  - name: Anthropic
    slug: anthropic
    enabled: true
  - name: Vercel
    slug: vercel
    enabled: true
  - name: DeepMind
    slug: deepmind
    enabled: true
  - name: Glean
    slug: gleanwork
    enabled: true
  - name: Airtable
    slug: airtable
    enabled: true
  - name: Intercom
    slug: intercom
    enabled: true
  - name: Stability AI
    slug: stabilityai
    enabled: true
  - name: Arize AI
    slug: arizeai
    enabled: true

# 国内大厂 API（直接调内部接口，无需 Playwright）
cn_api_companies:
  - name: 美团
    type: meituan
    api_url: https://zhaopin.meituan.com/api/official/job/getJobList
    keywords: "Android"
    enabled: true
  - name: 快手
    type: kuaishou
    api_url: https://zhaopin.kuaishou.cn/recruit/e/api/v1/open/positions/simple
    keywords: ""
    enabled: true
  - name: 滴滴
    type: didi
    api_url: https://talent.didiglobal.com/recruit-portal-service/api/job/front/list
    keywords: ""
    enabled: true

# Playwright 爬取公司（SPA 页面，API 不可用时的备选）
playwright_companies:
  - name: 字节跳动
    careers_url: https://jobs.bytedance.com/experienced/position
    enabled: false
    notes: "需要登录"
  - name: 腾讯
    careers_url: https://careers.tencent.com/
    enabled: false
    notes: "无公开 API"
  - name: 阿里巴巴
    careers_url: https://talent.alibaba.com/
    enabled: false
    notes: "无公开 API"
  - name: 百度
    careers_url: https://talent.baidu.com/
    enabled: false
    notes: "无公开 API"

# 搜索引擎查询（第三层：广撒网发现岗位）
# 通过 Google/Bing site: 搜索发现各公司招聘页上的岗位
search_queries:
  # === Android / 客户端方向 ===
  - name: 字节跳动 — Android
    query: '字节跳动 Android 客户端 开发 社招 jobs.bytedance.com'
    enabled: true
  - name: 腾讯 — Android
    query: '腾讯 Android 客户端 开发 社招 careers.tencent.com'
    enabled: true
  - name: 阿里巴巴 — Android
    query: '阿里巴巴 Android 客户端 开发 社招 talent.alibaba.com'
    enabled: true
  - name: 小红书 — Android
    query: '小红书 Android 客户端 开发 社招'
    enabled: true
  - name: 携程 — Android
    query: '携程 Android 客户端 开发 社招'
    enabled: true
  - name: 米哈游 — Android
    query: '米哈游 Android 客户端 开发 社招'
    enabled: true
  - name: 得物 — Android
    query: '得物 Android 客户端 开发 社招'
    enabled: true
  - name: B站 — Android
    query: 'bilibili Android 客户端 开发 社招'
    enabled: true
  - name: 拼多多 — Android
    query: '拼多多 Android 客户端 开发 社招'
    enabled: true
  - name: 网易 — Android
    query: '网易 Android 客户端 开发 社招'
    enabled: true
  - name: 京东 — Android
    query: '京东 Android 客户端 开发 社招'
    enabled: true
  - name: 蚂蚁集团 — Android
    query: '蚂蚁集团 Android 客户端 开发 社招'
    enabled: true

  # === AI 工程 / Agent 应用方向 ===
  - name: 字节跳动 — AI工程
    query: '字节跳动 AI工程师 OR AI应用 OR AI Agent 社招'
    enabled: true
  - name: 腾讯 — AI工程
    query: '腾讯 AI工程师 OR AI应用 OR AI平台 社招'
    enabled: true
  - name: 阿里巴巴 — AI工程
    query: '阿里巴巴 AI工程师 OR AI应用 社招'
    enabled: true
  - name: 百度 — AI工程
    query: '百度 AI工程师 OR AI应用 OR 大模型应用 社招'
    enabled: true
  - name: 华为 — AI工程
    query: '华为 AI工程师 OR AI应用 社招 career.huawei.com'
    enabled: true
  - name: 小米 — AI工程
    query: '小米 AI工程师 OR AI应用 社招 hr.xiaomi.com'
    enabled: true
  - name: OPPO — 客户端
    query: 'OPPO Android OR 客户端 OR AI应用 社招'
    enabled: true
  - name: vivo — 客户端
    query: 'vivo Android OR 客户端 OR AI应用 社招'
    enabled: true

  # === 新兴 AI 公司（偏工程岗） ===
  - name: 月之暗面 — 工程
    query: '月之暗面 Moonshot 工程师 社招 招聘'
    enabled: true
  - name: 智谱AI — 工程
    query: '智谱AI 工程师 开发 社招 招聘'
    enabled: true
  - name: MiniMax — 工程
    query: 'MiniMax 工程师 开发 社招 招聘'
    enabled: true
  - name: 百川智能 — 工程
    query: '百川智能 工程师 开发 社招 招聘'
    enabled: true
  - name: 深度求索 — 工程
    query: 'DeepSeek 深度求索 工程师 开发 社招'
    enabled: true
  - name: 阶跃星辰 — 工程
    query: '阶跃星辰 StepFun 工程师 社招'
    enabled: true

  # === 细分方向搜索 ===
  - name: Android 社招 — 南京上海
    query: 'Android 开发工程师 社招 南京 OR 上海 OR 苏州 OR 杭州 2026'
    enabled: true
  - name: 客户端性能优化
    query: '客户端 性能优化 工程师 社招 招聘'
    enabled: true
  - name: Flutter 社招
    query: 'Flutter 工程师 社招 招聘 2026'
    enabled: true
  - name: Rust 社招
    query: 'Rust 工程师 社招 招聘 互联网 2026'
    enabled: true
  - name: 端侧AI
    query: '端侧AI OR on-device AI 工程师 社招 招聘'
    enabled: true
  - name: AI Agent工程师
    query: 'AI Agent 工程师 社招 招聘 上海 OR 杭州 OR 南京'
    enabled: true
  - name: AI应用工程师
    query: 'AI应用工程师 OR 大模型应用工程师 社招 招聘'
    enabled: true
  - name: MLOps工程师
    query: 'MLOps OR AI平台 工程师 社招 招聘'
    enabled: true
  - name: Boss直聘 — Android
    query: 'site:zhipin.com Android 工程师 社招'
    enabled: true
  - name: Boss直聘 — AI工程
    query: 'site:zhipin.com AI工程师 OR AI应用 社招'
    enabled: true
  - name: 猎聘 — Android
    query: 'site:liepin.com Android 工程师 社招'
    enabled: true
  - name: 猎聘 — AI工程
    query: 'site:liepin.com AI工程师 OR AI应用 社招'
    enabled: true

# 地区过滤（可选，留空则不过滤）
location_filter:
  - "南京"
  - "Nanjing"
  - "上海"
  - "Shanghai"
  - "苏州"
  - "Suzhou"
  - "杭州"
  - "Hangzhou"
